name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: ci-test-jwt-secret-key
      ADMIN_KEY: ci-test-admin-key
      DEEPSEEK_API_KEY: ci-test-dummy-key
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install ruff
          ruff check app/ || true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
        env:
          JWT_SECRET: ci-test-jwt-secret-key
          ADMIN_KEY: ci-test-admin-key

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t app:${{ github.sha }} .

      - name: Run container smoke test
        run: |
          docker run -d --name smoke -p 8000:8000 \
            -e JWT_SECRET=smoke-test-secret \
            -e ADMIN_KEY=smoke-admin-key \
            -e DEEPSEEK_API_KEY=dummy \
            app:${{ github.sha }}
          sleep 5
          docker logs smoke
          docker stop smoke
